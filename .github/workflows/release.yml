name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: volta-${{ github.ref_name }}-x86_64-linux.tar.gz
            binary: volta

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: volta-${{ github.ref_name }}-x86_64-macos.tar.gz
            binary: volta

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: volta-${{ github.ref_name }}-aarch64-macos.tar.gz
            binary: volta

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: volta-${{ github.ref_name }}-x86_64-windows.zip
            binary: volta.exe

    steps:
      # actions/checkout @ v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # dtolnay/rust-toolchain @ stable
      - uses: dtolnay/rust-toolchain@4f366e621dc8fa63f557ca04b8f4361824a35a45
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # Swatinem/rust-cache @ v2.7.7
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }} ${{ matrix.binary }}
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ../../../${{ matrix.artifact }}
          cd ../../..

      - name: Upload artifact
        # actions/upload-artifact @ v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # actions/checkout @ v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download all artifacts
        # actions/download-artifact @ v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts/

      - name: Create GitHub release
        # softprops/action-gh-release @ v2.3.2
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          files: artifacts/**/*
          generate_release_notes: true
