name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: volta-${{ github.ref_name }}-linux-x86_64.tar.gz
            binary: volta
            upload_raw: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: volta-macos-arm64
            binary: volta
            upload_raw: true

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: volta-macos-x86_64
            binary: volta
            upload_raw: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: volta-${{ github.ref_name }}-windows-x86_64.zip
            binary: volta.exe
            upload_raw: false

    steps:
      # actions/checkout @ v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # dtolnay/rust-toolchain @ stable
      - uses: dtolnay/rust-toolchain@4f366e621dc8fa63f557ca04b8f4361824a35a45
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # Swatinem/rust-cache @ v2.7.7
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Linux)
        if: matrix.upload_raw == false && runner.os != 'Windows'
        run: |
          tar czf ${{ matrix.artifact_name }} -C target/${{ matrix.target }}/release ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.binary }} -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload packaged artifact
        # actions/upload-artifact @ v4.6.2
        if: matrix.upload_raw == false
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

      - name: Upload raw macOS binary
        # actions/upload-artifact @ v4.6.2
        if: matrix.upload_raw == true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  package-macos:
    name: Package macOS universal
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: volta-macos-arm64
          path: artifacts/volta-macos-arm64

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: volta-macos-x86_64
          path: artifacts/volta-macos-x86_64

      - name: Create macOS universal tarball
        run: |
          lipo -create \
            artifacts/volta-macos-arm64/volta \
            artifacts/volta-macos-x86_64/volta \
            -output volta
          chmod +x volta
          tar czf volta-${{ github.ref_name }}-macos-universal.tar.gz volta
          rm volta

      - name: Upload packaged macOS universal artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: volta-${{ github.ref_name }}-macos-universal.tar.gz
          path: volta-${{ github.ref_name }}-macos-universal.tar.gz

  release:
    name: Publish release
    needs: [build, package-macos, smoke]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      # actions/checkout @ v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download all artifacts
        # actions/download-artifact @ v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts/

      - name: Create GitHub release
        # softprops/action-gh-release @ v2.3.2
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          generate_release_notes: true
          files: |
            artifacts/volta-${{ github.ref_name }}-linux-x86_64.tar.gz/volta-${{ github.ref_name }}-linux-x86_64.tar.gz
            artifacts/volta-${{ github.ref_name }}-macos-universal.tar.gz/volta-${{ github.ref_name }}-macos-universal.tar.gz
            artifacts/volta-${{ github.ref_name }}-windows-x86_64.zip/volta-${{ github.ref_name }}-windows-x86_64.zip

  smoke:
    name: Smoke check ${{ matrix.os }}
    needs: [build, package-macos]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: volta-${{ github.ref_name }}-linux-x86_64.tar.gz
            binary: volta
            unpack: tar

          - os: macos-latest
            artifact: volta-${{ github.ref_name }}-macos-universal.tar.gz
            binary: volta
            unpack: tar

          - os: macos-15-intel
            artifact: volta-${{ github.ref_name }}-macos-universal.tar.gz
            binary: volta
            unpack: tar

          - os: windows-latest
            artifact: volta-${{ github.ref_name }}-windows-x86_64.zip
            binary: volta.exe
            unpack: zip

    steps:
      # actions/checkout @ v4.2.2 — needed for examples/xor.vt
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download artifact
        # actions/download-artifact @ v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: Unpack (tar)
        if: matrix.unpack == 'tar'
        run: |
          tar xzf dist/${{ matrix.artifact }} -C dist/
          chmod +x dist/${{ matrix.binary }}

      - name: Unpack (zip)
        if: matrix.unpack == 'zip'
        shell: pwsh
        run: |
          Expand-Archive -Path dist/${{ matrix.artifact }} -DestinationPath dist/

      - name: Smoke — volta --help
        run: ./dist/${{ matrix.binary }} --help

      - name: Smoke — volta doctor
        run: ./dist/${{ matrix.binary }} doctor

      - name: Smoke — volta run examples/xor.vt
        run: ./dist/${{ matrix.binary }} run examples/xor.vt
